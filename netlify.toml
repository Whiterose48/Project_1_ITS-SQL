[build]
  base = "frontend"
  command = "pnpm install && pnpm run build"
  publish = "frontend/dist"

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Embedder-Policy = "credentialless"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
